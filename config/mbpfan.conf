# mbpfan configuration for Intel MacBooks
# Optimized for: MacBook Air 2017 (MacBookAir7,2)
# applesmc: fan1_min=1200 RPM, fan1_max=6500 RPM
# Requires kernel modules: coretemp, applesmc
#
# Install: yay -S mbpfan
# Modules: create /etc/modules-load.d/mbpfan.conf with: coretemp\napplesmc

[general]
# verbose = true

[main]
# Minimum fan speed (hardware minimum for MacBook Air 2017 = 1200 RPM)
min_fan1_speed = 1200

# Maximum fan speed (hardware maximum = 6500 RPM)
max_fan1_speed = 6500

# Temperature (°C) below which fan stays at minimum speed
# MacBook Air 2017 idles at ~55-62°C — keep quiet below 55°C
low_temp = 55

# Temperature (°C) above which fan starts ramping toward maximum
high_temp = 65

# Temperature (°C) at which fan is forced to maximum immediately
# i5-5350U Tjmax = 100°C — 85°C gives safe headroom
max_temp = 85

# Polling interval in seconds
polling_interval = 5
