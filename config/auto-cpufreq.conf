# auto-cpufreq configuration for Intel MacBooks
# Optimized for: MacBook Air 2017 (i5-5350U, Broadwell-U)
# Driver: intel_cpufreq (passive mode)
# CPU: 500 MHz min, 1800 MHz base, 2900 MHz turbo
#
# Install: yay -S auto-cpufreq && sudo auto-cpufreq --install

[charger]
governor = performance
scaling_min_freq = 800000
scaling_max_freq = 2900000
turbo = auto

[battery]
governor = powersave
scaling_min_freq = 500000
scaling_max_freq = 1800000
turbo = auto
