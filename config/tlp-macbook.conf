# TLP drop-in configuration for Intel MacBooks
# Place at: /etc/tlp.d/10-macbook.conf
#
# Scope: disk, USB, WiFi, audio, PCIe, runtime PM only.
# CPU governor/freq: managed by auto-cpufreq — NOT set here.
# Battery threshold: managed by apple-battery-guard — NOT set here.
#
# Install: sudo pacman -S tlp
# Apply:   sudo tlp start

# --- CPU: managed by auto-cpufreq, do not set ---
# CPU_SCALING_GOVERNOR_ON_AC=performance
# CPU_SCALING_GOVERNOR_ON_BAT=powersave

# --- Battery thresholds: managed by apple-battery-guard, do not set ---
# START_CHARGE_THRESH_BAT0=75
# STOP_CHARGE_THRESH_BAT0=80

# --- Disk ---
DISK_IDLE_SECS_ON_AC=0
DISK_IDLE_SECS_ON_BAT=2

MAX_LOST_WORK_SECS_ON_AC=15
MAX_LOST_WORK_SECS_ON_BAT=60

SATA_LINKPWR_ON_AC="med_power_with_dipm"
SATA_LINKPWR_ON_BAT="med_power_with_dipm"

AHCI_RUNTIME_PM_ON_AC=on
AHCI_RUNTIME_PM_ON_BAT=auto
AHCI_RUNTIME_PM_TIMEOUT=15

# --- PCIe ASPM ---
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersupersave

# --- Runtime PM for PCI(e) devices ---
RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=auto

# Exclude xhci_hcd to avoid USB device wakeup issues
RUNTIME_PM_DRIVER_DENYLIST="mei_me xhci_hcd"

# --- WiFi ---
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# --- Audio ---
SOUND_POWER_SAVE_ON_AC=0
SOUND_POWER_SAVE_ON_BAT=1
SOUND_POWER_SAVE_CONTROLLER=Y

# --- USB autosuspend ---
USB_AUTOSUSPEND=1
# Uncomment and add device IDs if a USB device misbehaves:
# USB_DENYLIST="1234:5678"

# --- NMI watchdog (saves ~0.5W) ---
NMI_WATCHDOG=0
